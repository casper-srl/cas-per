server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /home {
        return 301 /;
    }

    location = /home/ {
        return 301 /;
    }

    location = /servizi {
        return 301 /soluzioni/;
    }

    location = /servizi/ {
        return 301 /soluzioni/;
    }

    location = /servizi/annunci-funebri-necrologi {
        return 301 /soluzioni/annunci-funebri-necrologi/;
    }

    location = /servizi/annunci-funebri-necrologi/ {
        return 301 /soluzioni/annunci-funebri-necrologi/;
    }

    location = /servizi/gestionale-eterno {
        return 301 /soluzioni/gestionale-eterno/;
    }

    location = /servizi/gestionale-eterno/ {
        return 301 /soluzioni/gestionale-eterno/;
    }

    location = /servizi/editor-grafico-giotto {
        return 301 /soluzioni/editor-grafico-giotto/;
    }

    location = /servizi/editor-grafico-giotto/ {
        return 301 /soluzioni/editor-grafico-giotto/;
    }

    location = /servizi/streaming-cerimonia {
        return 301 /soluzioni/streaming-cerimonia/;
    }

    location = /servizi/streaming-cerimonia/ {
        return 301 /soluzioni/streaming-cerimonia/;
    }

    location = /servizi/siti-web-impresa-funebre {
        return 301 /soluzioni/siti-web-app-imprese-funebri/;
    }

    location = /servizi/siti-web-impresa-funebre/ {
        return 301 /soluzioni/siti-web-app-imprese-funebri/;
    }

    location = /servizi/monitor-vetrina-e-case-funerarie {
        return 301 /monitor-case-funerarie/;
    }

    location = /servizi/monitor-vetrina-e-case-funerarie/ {
        return 301 /monitor-case-funerarie/;
    }

    location = /promo-case-funerarie {
        return 301 /monitor-case-funerarie/;
    }

    location = /promo-case-funerarie/ {
        return 301 /monitor-case-funerarie/;
    }

    location = /monitor-case-funerarie {
        return 301 /monitor-case-funerarie/;
    }

    location = /monitor-case-funerarie/ {
        try_files /soluzioni/monitor-case-funerarie/index.html =404;
    }

    # Astro builds pages in directory format (es. /chi-siamo/index.html)
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Asset di build con hash: cache lunga e immutabile
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
